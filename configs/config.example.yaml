# rud1-agent configuration example
# Copy to /etc/rud1-agent/config.yaml (Linux) or %APPDATA%\Rud1\agent\config.yaml (Windows)

log_level: info

server:
  host: 0.0.0.0
  port: 7070
  read_timeout: 15s
  write_timeout: 30s
  allowed_origins:
    - http://localhost:5173
    - http://localhost:80
    - http://rud1.local
  # auth_token: ""  # Optional: set to require Bearer auth on local API

cloud:
  enabled: true
  base_url: https://rud1.es
  api_secret: ""        # Required: matches DEVICE_API_SECRET env var on rud1-es
  # registration_code: # Leave empty in production — the agent generates and persists
  #                    # a unique code on first boot under platform.ConfigDir().
  #                    # Set explicitly only for testing / forced re-pairing scenarios.
  heartbeat_interval: 60s
  http_timeout: 20s

vpn:
  interface: wg0
  config_path: /etc/wireguard/wg0.conf

usb:
  bind_port: 3240
  usbip_enabled: false          # Set to true to enable USB/IP server (Linux only)
  authorized_nets:              # CIDRs allowed to attach USB devices (empty = no restriction)
    - 10.200.0.0/16             # Allow VPN subnet (adjust to your WireGuard range)

network:
  # WiFi client + setup-AP (NetworkManager) + optional LTE modem (ModemManager).
  # Leave ap_ssid / ap_password blank to auto-derive them from the device's
  # machine-id — stable per device, unique across the fleet.
  wifi_interface: wlan0
  ap_interface: wlan0
  ap_ssid: ""
  ap_password: ""
  ap_cidr: 192.168.50.1/24
  auto_ap: true                 # raise the setup hotspot when offline for too long
  # offline_grace_seconds is intentionally aggressive (15s) so an installer
  # SSH'ing into a freshly imaged Pi can rely on the AP coming up quickly.
  # Combined with the supervisor's 20s boot grace, a device with no uplink
  # exposes its setup SSID within ~35s of boot. Bump this to 60-120s if
  # your fleet sits on flaky WiFi and you want extra flap protection.
  offline_grace_seconds: 15
  preferred_uplink: auto        # auto | wifi | cellular
  cellular_apn: ""
  cellular_data_cap_mb: 0

# setup is filled in automatically by the first-boot wizard via
# POST /api/setup/general + POST /api/setup/complete. You can pre-seed it
# here for an automated provisioning flow, but in normal operation just
# leave it untouched.
setup:
  complete: false
  device_name: ""
  device_location: ""
  # notes: ""
  # completed_at: 0
