# /etc/sysctl.d/99-rud1.conf
# Kernel tuning required by rud1-agent.

# IP forwarding is mandatory for WireGuard to route packets from VPN peers.
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# Larger conntrack table — devices behind NAT with many concurrent tunnels.
net.netfilter.nf_conntrack_max = 131072

# Reasonable TCP defaults for a small gateway.
net.core.somaxconn = 1024
net.ipv4.tcp_fin_timeout = 15
