# /etc/nginx/sites-available/rud1
#
# Serves the Astro static build on port 80. The browser-side code talks to
# the agent directly on http://<host>:7070 (CORS is configured in the
# agent's config.yaml), so we don't need a /api proxy here — keeping the
# reverse path removes a moving part on the Pi.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /var/www/rud1;
    index index.html;

    # Basic hardening
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA fallback — Astro outputs .html per route, but missing routes
    # should land on the index so the SPA router can decide.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Long-cache fingerprinted assets
    location ~* \.(?:css|js|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Disable caching for the entrypoint
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
